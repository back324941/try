<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>搭伙晚餐 Hearth Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1410; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        .gold-gradient { background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%); }
        .day-tab.active { border-color: #a67c52; background-color: rgba(166, 124, 82, 0.1); color: #a67c52; }
        #cart-drawer { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #cart-drawer.open { transform: translateX(0); }
        #cart-overlay { transition: opacity 0.3s ease; pointer-events: none; opacity: 0; }
        #cart-overlay.open { pointer-events: auto; opacity: 1; }
        input, select { font-size: 16px !important; } 
    </style>
</head>
<body class="min-h-screen py-4 px-3 pb-24 text-gray-900">

    <div class="fixed top-4 right-3 z-40">
        <button type="button" onclick="toggleCart(true)" class="gold-gradient p-2 px-4 rounded-full shadow-2xl border border-white/30 backdrop-blur-md flex items-center gap-3 active:scale-95 transition-transform">
            <div class="text-right">
                <div class="text-[10px] text-white/80 font-bold leading-none">總額</div>
                <div class="text-xl font-black text-white italic">NT$ <span id="cart-total">0</span></div>
            </div>
            <div class="bg-white/20 w-8 h-8 rounded-full flex items-center justify-center text-sm">🛒</div>
        </button>
    </div>

    <div id="cart-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/80 z-50"></div>
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-4/5 max-w-sm bg-white z-50 shadow-2xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6 border-b-2 pb-2 text-gray-800">
            <h2 class="text-2xl font-black italic">點餐清單</h2>
            <button onclick="toggleCart(false)" class="text-gray-400 text-3xl p-2">✕</button>
        </div>
        <div class="mb-4 p-3 bg-red-50 border-l-4 border-red-500 text-red-700 text-sm font-black">
            ⚠️ 提醒：餐點均「不附白飯」
        </div>
        <div id="cart-items-list" class="flex-1 overflow-y-auto space-y-4"></div>
        <div class="border-t-2 pt-4 mt-4">
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-400 font-bold">合計金額</span>
                <span class="text-3xl font-black text-[#a67c52]">NT$ <span id="drawer-total">0</span></span>
            </div>
            <button onclick="toggleCart(false)" class="w-full py-5 bg-gray-100 rounded-2xl font-black text-gray-600 text-lg">繼續加點</button>
        </div>
    </div>

    <div class="max-w-xl mx-auto">
        <div id="form-container" class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="gold-gradient p-8 text-white text-center">
                <h1 class="text-3xl font-black tracking-widest">搭伙晚餐</h1>
                <p class="text-[11px] mt-1 tracking-[0.4em] font-light italic opacity-90 uppercase">HEARTH TABLE</p>
                <div class="mt-4 inline-block bg-black/10 px-5 py-2 rounded-full border border-white/20">
                    <p class="text-xs font-black tracking-widest text-yellow-100">✨ 全面使用「冷壓初榨橄欖油」✨</p>
                </div>
            </div>

            <form id="orderForm" class="p-5 space-y-8">
                <div class="bg-gray-50 rounded-[2rem] p-6 space-y-5 border border-gray-100 shadow-inner">
                    <input type="text" id="userName" required class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 text-xl font-bold focus:border-[#a67c52] outline-none" placeholder="聯絡人 (Line 名稱)">
                    <div class="flex gap-2">
                        <select id="deliveryType" class="flex-1 px-4 py-4 rounded-2xl border-2 border-gray-100 bg-white font-black text-lg appearance-none" onchange="toggleAddress(this.value)">
                            <option value="自取">自取</option>
                            <option value="外送">外送 (3公里內)</option>
                        </select>
                        <select id="pickupTime" class="flex-1 px-4 py-4 rounded-2xl border-2 border-gray-100 bg-white font-black text-lg appearance-none">
                            <option value="17:00-18:00">17:00-18:00</option>
                            <option value="17:30-18:30">17:30-18:30</option>
                            <option value="18:30-19:00">18:30-19:00</option>
                        </select>
                    </div>
                    <div id="addressBox" class="hidden">
                        <input type="text" id="userAddress" class="w-full px-5 py-4 rounded-2xl border-2 border-orange-100 text-lg font-bold" placeholder="輸入外送地址">
                        <p class="text-[11px] text-orange-600 font-bold mt-1 ml-1">※ 外送費 +NT$50 / 日</p>
                    </div>
                    <select id="paymentMethod" class="w-full px-5 py-4 rounded-2xl border-2 border-gray-100 bg-white font-black text-lg appearance-none">
                        <option value="轉帳">轉帳 (優先)</option>
                        <option value="現金">現場支付</option>
                        <option value="管理員代付">管理員代付</option>
                    </select>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-end px-2 text-[#a67c52]">
                        <h2 class="text-base font-black italic tracking-widest">選擇日期</h2>
                        <button type="button" onclick="resetCurrentDay()" class="text-xs font-bold border-b border-gray-300 text-gray-400">↺ 重設當日</button>
                    </div>
                    <div class="flex border-2 rounded-2xl overflow-hidden bg-gray-50 border-gray-100 shadow-sm font-black text-xl">
                        <button type="button" onclick="switchDay('Tue')" id="tab-Tue" class="day-tab active flex-1 py-4 text-center">二</button>
                        <button type="button" onclick="switchDay('Wed')" id="tab-Wed" class="day-tab flex-1 py-4 text-center">三</button>
                        <button type="button" onclick="switchDay('Thu')" id="tab-Thu" class="day-tab flex-1 py-4 text-center">四</button>
                        <button type="button" onclick="switchDay('Fri')" id="tab-Fri" class="day-tab flex-1 py-4 text-center">五</button>
                    </div>
                </div>

                <div id="menu-content" class="space-y-8 min-h-[300px]"></div>

                <div class="pt-6 flex flex-col gap-4">
                    <button type="button" id="nextDayBtn" onclick="goToNextDay()" class="w-full py-5 bg-gray-800 text-white rounded-2xl font-black text-xl shadow-lg flex justify-center items-center gap-3 active:scale-95 transition-transform">
                        下一天選單 <span>➔</span>
                    </button>
                    <button type="submit" id="submitBtn" class="gold-gradient w-full py-6 rounded-3xl text-white font-black text-2xl shadow-xl tracking-[0.2em] active:scale-95 transition-transform">
                        確認預訂並截圖
                    </button>
                </div>
            </form>
        </div>

        <div id="success-container" class="hidden bg-white rounded-[3rem] shadow-2xl p-8 text-center border">
            <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-lg">✓</div>
            <div class="bg-red-50 p-6 rounded-[2rem] border-2 border-red-200 mb-8 relative">
                <div class="absolute -top-4 left-1/2 -translate-x-1/2 bg-red-500 text-white text-xs px-4 py-1 rounded-full font-black">重要手續</div>
                <h2 class="text-3xl font-black text-red-600 mb-2">📸 請務必截圖回傳</h2>
                <p class="text-red-500 font-bold text-base leading-relaxed">請將下方明細截圖後<br>回傳至我們的 Line 視窗</p>
            </div>
            <div id="summary-content" class="text-left text-[14px] font-bold whitespace-pre-line leading-loose border-2 p-6 rounded-[2rem] bg-gray-50 font-mono text-gray-800 shadow-inner"></div>
            <button onclick="location.reload()" class="mt-10 text-gray-400 text-sm font-black underline tracking-[0.2em]">↺ 回到選單</button>
        </div>
    </div>

    <script>
        const menus = {
            Tue: { 
                main: [{i:"A",n:"果香翅小腿",m:180,s:100},{i:"B",n:"薑煸小卷",m:250,s:150},{i:"C",n:"蔥爆豬肉片",m:180,s:100},{i:"D",n:"乾煎鱸魚",m:210,s:120},{i:"E",n:"乾煎鮭魚",m:290,s:170}], 
                side: [{i:"F",n:"糯米椒炒豆乾",m:100,s:60},{i:"G",n:"馬鈴薯炒肉絲",m:110,s:70},{i:"H",n:"番茄炒蛋",m:100,s:60}], 
                soup: {n:"味噌牡蠣湯", p:100} 
            },
            Wed: { 
                main: [{i:"A",n:"香菇肉燥",m:180,s:100},{i:"B",n:"檸檬魚",m:230,s:130},{i:"C",n:"蔥爆牛肉",m:240,s:140},{i:"D",n:"大黃瓜燴蝦仁",m:180,s:100},{i:"E",n:"乾煎鮭魚",m:290,s:170}], 
                side: [{i:"F",n:"蔬菜烘蛋",m:120,s:60},{i:"G",n:"馬鈴薯炒肉絲",m:110,s:70},{i:"H",n:"蔥爆豆乾",m:100,s:60}], 
                soup: {n:"海帶芽貢丸湯", p:100} 
            },
            Thu: { 
                main: [{i:"A",n:"南瓜滷肉",m:220,s:130},{i:"B",n:"茄汁鯖魚",m:200,s:120},{i:"C",n:"蔥爆牛肉",m:240,s:140},{i:"D",n:"大黃瓜燴蝦仁",m:180,s:100},{i:"E",n:"乾煎鮭魚",m:290,s:170}], 
                side: [{i:"F",n:"蟹黃豆腐煲",m:120,s:70},{i:"G",n:"蔥爆豆乾",m:100,s:60},{i:"H",n:"番茄炒蛋",m:100,s:60}], 
                soup: {n:"香菇雞湯", p:120} 
            },
            Fri: { 
                main: [{i:"A",n:"白醬嫩雞",m:200,s:120},{i:"B",n:"絲瓜鮮蚵",m:190,s:110},{i:"C",n:"蔥爆豬肉片",m:180,s:100},{i:"D",n:"紅燒鱸魚",m:210,s:120},{i:"E",n:"乾煎鮭魚",m:290,s:170}], 
                side: [{i:"F",n:"金針菇炒豆包",m:100,s:60},{i:"G",n:"蔥爆豆乾",m:100,s:60},{i:"H",n:"番茄炒蛋",m:100,s:60}], 
                soup: {n:"香根牛肉湯", p:120} 
            }
        };

        let selections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} };
        let currentDay = 'Tue';
        const dayOrder = ['Tue', 'Wed', 'Thu', 'Fri'];

        function toggleCart(open) {
            document.getElementById('cart-drawer').classList.toggle('open', open);
            document.getElementById('cart-overlay').classList.toggle('open', open);
            if(open) updateDrawerList();
        }
        function toggleAddress(val) { document.getElementById('addressBox').classList.toggle('hidden', val==='自取'); updateTotal(); }
        function switchDay(day) { 
            currentDay = day; 
            document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active')); 
            document.getElementById(`tab-${day}`).classList.add('active'); 
            renderMenu();
            document.getElementById('nextDayBtn').classList.toggle('hidden', day==='Fri');
        }
        function goToNextDay() {
            const idx = dayOrder.indexOf(currentDay);
            if(idx < 3) switchDay(dayOrder[idx+1]);
            window.scrollTo({top: 250, behavior: 'smooth'});
        }
        function resetCurrentDay() { if(confirm('重設今日選擇？')) { selections[currentDay] = {}; renderMenu(); updateTotal(); } }

        function renderMenu() {
            const sel = selections[currentDay];
            const data = menus[currentDay];
            let html = `<div class="grid grid-cols-2 gap-3">
                <label class="cursor-pointer"><input type="radio" name="orderType" value="M" ${sel.type==='M'?'checked':''} onchange="updateSel('type','M')" class="peer sr-only"><div class="py-5 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52] text-lg shadow-sm">M 套餐 $500<div class="text-[9px] font-normal opacity-60">1 主菜 + 1 副菜 + 2 時蔬</div></div></label>
                <label class="cursor-pointer"><input type="radio" name="orderType" value="S" ${sel.type==='S'?'checked':''} onchange="updateSel('type','S')" class="peer sr-only"><div class="py-5 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52] text-lg shadow-sm">S 套餐 $300<div class="text-[9px] font-normal opacity-60">1 主菜 + 1 副菜 + 2 時蔬</div></div></label>
                <label class="cursor-pointer col-span-2"><input type="radio" name="orderType" value="NONE" ${sel.type==='NONE'?'checked':''} onchange="updateSel('type','NONE')" class="peer sr-only"><div class="py-4 text-center border-2 rounded-2xl font-black text-gray-300 peer-checked:border-[#a67c52] peer-checked:text-[#a67c52] text-base tracking-[0.2em] italic">➔ 切換至自由單點模式</div></label>
            </div>`;

            if (sel.type && sel.type !== 'NONE') {
                const limit = sel.type === 'M' ? 180 : 100;
                html += `<div class="space-y-3"><h3 class="text-xs font-black text-gray-400 italic">選主菜 (套餐僅限一款)</h3>`;
                data.main.forEach((m, i) => {
                    const price = sel.type === 'M' ? m.m : m.s;
                    const extra = Math.max(0, price - limit);
                    html += `<label class="block cursor-pointer"><input type="radio" name="mainC" ${sel.mainIdx===i?'checked':''} onchange="updateSel('mainIdx',${i})" class="peer sr-only"><div class="p-5 border-2 rounded-2xl font-black text-gray-700 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 flex justify-between items-center text-xl shadow-sm"><span>${m.i}. ${m.n}</span><span class="text-xs ${extra>0?'text-orange-500':'text-gray-300'}">${extra>0?'+$'+extra:'$0'}</span></div></label>`;
                });
                html += `</div><div class="space-y-3"><h3 class="text-xs font-black text-gray-400 italic">選副菜</h3>`;
                data.side.forEach((s, i) => {
                    html += `<label class="block cursor-pointer"><input type="radio" name="sideC" ${sel.sideIdx===i?'checked':''} onchange="updateSel('sideIdx',${i})" class="peer sr-only"><div class="p-5 border-2 rounded-2xl font-black text-gray-700 peer-checked:border-[#a67c52] text-xl shadow-sm">${s.i}. ${s.n}</div></label>`;
                });
                html += `<label class="block cursor-pointer"><input type="radio" name="sideC" ${sel.sideIdx==='extra-veg'?'checked':''} onchange="updateSel('sideIdx','extra-veg')" class="peer sr-only"><div class="p-5 border-2 rounded-2xl font-black text-green-600 peer-checked:border-green-500 bg-green-50/30 text-xl shadow-sm italic text-center">✨ 不要副菜，時蔬加量</div></label></div>`;
            } else if (sel.type === 'NONE') {
                html += `<div class="p-8 bg-orange-50/50 rounded-3xl border-2 border-dashed border-orange-200 text-center"><p class="text-orange-700 font-black text-xl">已進入自由單點模式</p><p class="text-orange-600/70 text-xs mt-2 font-bold italic">請從下方加點區挑選菜色</p></div>`;
            }

            if(sel.type) {
                html += `<div class="pt-8 border-t border-dashed space-y-5"><h3 class="text-sm font-black text-[#a67c52] italic border-l-8 border-[#a67c52] pl-3 uppercase">菜色單點區</h3>`;
                data.main.forEach((m, i) => html += renderAddon(`addonM-${i}`, m.i, m.n, m.m, m.s));
                data.side.forEach((s, i) => html += renderAddon(`addonS-${i}`, s.i, s.n, s.m, s.s));
                const sQty = sel['addonSoup'] || 0;
                html += `<div class="p-5 bg-gray-50 rounded-[2rem] flex justify-between items-center border-2 border-gray-100 shadow-sm"><div><div class="font-black text-gray-800 text-xl">${data.soup.n}</div><div class="text-xs text-gray-400 font-bold">$${data.soup.p} / 份</div></div><div class="flex items-center gap-4"><button type="button" onclick="changeQty('addonSoup',-1)" class="w-12 h-12 bg-white border-2 rounded-2xl text-gray-300 font-black text-2xl shadow-sm">－</button><span class="w-6 text-center font-black text-2xl">${sQty}</span><button type="button" onclick="changeQty('addonSoup',1)" class="w-12 h-12 bg-white border-2 rounded-2xl text-[#a67c52] font-black text-2xl shadow-sm">＋</button></div></div>`;
                html += `</div>`;
            }
            document.getElementById('menu-content').innerHTML = html;
        }

        function renderAddon(id, letter, name, pM, pS) {
            const sel = selections[currentDay];
            return `<div class="p-5 bg-gray-50 rounded-[2rem] space-y-4 border-2 border-gray-100 shadow-sm"><div><div class="font-black text-gray-700 text-lg">${letter}. ${name}</div></div><div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-3 px-4 rounded-2xl flex justify-between items-center border-2 border-gray-50 shadow-inner"><span class="text-xs font-black text-gray-300">M $${pM}</span><div class="flex items-center gap-3"><button type="button" onclick="changeQty('${id}-M',-1)" class="text-gray-300 font-black text-2xl px-1">－</button><span class="text-xl font-black w-6 text-center">${sel[id+'-M']||0}</span><button type="button" onclick="changeQty('${id}-M',1)" class="text-[#a67c52] font-black text-2xl px-1">＋</button></div></div>
                <div class="bg-white p-3 px-4 rounded-2xl flex justify-between items-center border-2 border-gray-50 shadow-inner"><span class="text-xs font-black text-gray-300">S $${pS}</span><div class="flex items-center gap-3"><button type="button" onclick="changeQty('${id}-S',-1)" class="text-gray-300 font-black text-2xl px-1">－</button><span class="text-xl font-black w-6 text-center">${sel[id+'-S']||0}</span><button type="button" onclick="changeQty('${id}-S',1)" class="text-[#a67c52] font-black text-2xl px-1">＋</button></div></div>
            </div></div>`;
        }

        function updateSel(k, v) { selections[currentDay][k] = v; renderMenu(); updateTotal(); }
        function changeQty(id, amt) { selections[currentDay][id] = Math.max(0, (selections[currentDay][id] || 0) + amt); renderMenu(); updateTotal(); }

        function updateTotal() {
            let total = 0; let activeDays = 0;
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                activeDays++;
                if (s.type === 'M') total += 500 + Math.max(0, (menus[day].main[s.mainIdx||0]?.m || 0) - 180);
                else if (s.type === 'S') total += 300 + Math.max(0, (menus[day].main[s.mainIdx||0]?.s || 0) - 100);
                else total += 50; 
                Object.keys(s).forEach(k => { if (s[k]>0 && k.includes('addon')) {
                    const p = k.split('-');
                    if (k.startsWith('addonM-')) total += s[k] * (p[2]==='M' ? menus[day].main[p[1]].m : menus[day].main[p[1]].s);
                    if (k.startsWith('addonS-')) total += s[k] * (p[2]==='M' ? menus[day].side[p[1]].m : menus[day].side[p[1]].s);
                    if (k === 'addonSoup') total += s[k] * menus[day].soup.p;
                }});
            }
            total += (document.getElementById('deliveryType').value === '外送' ? activeDays * 50 : 0);
            document.getElementById('cart-total').innerText = total.toLocaleString();
            document.getElementById('drawer-total').innerText = total.toLocaleString();
        }

        function updateDrawerList() {
            let list = [];
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                const dName = {Tue:'週二',Wed:'週三',Thu:'週四',Fri:'週五'}[day];
                const info = s.type==='NONE' ? '自由單點模式' : s.type+'套餐: '+menus[day].main[s.mainIdx||0].n;
                list.push(`<div class="p-4 bg-gray-50 rounded-2xl border-l-8 border-[#a67c52] shadow-sm"><div class="text-[#a67c52] font-black text-lg mb-1">${dName}</div><div class="text-sm font-bold text-gray-500">${info}</div></div>`);
            }
            document.getElementById('cart-items-list').innerHTML = list.length ? list.join('') : '<div class="text-center py-20 text-gray-300 font-black">尚未點餐</div>';
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const delivery = document.getElementById('deliveryType').value;
            const address = document.getElementById('userAddress').value;
            let d = [
                `【搭伙晚餐 Hearth Table 預訂】`,
                `▫️ 聯絡人：${document.getElementById('userName').value}`,
                `▫️ 方式：${delivery}${address ? ' ('+address+')' : ''}`,
                `▫️ 時間：${document.getElementById('pickupTime').value}`,
                `▫️ 付款：${document.getElementById('paymentMethod').value}`,
                `---------------------------`,
                `✨ 全面使用冷壓初榨橄欖油`,
                `🚫 提醒：餐點均「不附白飯」`,
                `---------------------------`
            ];
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                const data = menus[day];
                d.push(`● ${{Tue:'週二',Wed:'週三',Thu:'週四',Fri:'週五'}[day]}`);
                if (s.type !== 'NONE') {
                    d.push(` ▫️ ${s.type}套餐：${data.main[s.mainIdx||0].i}. ${data.main[s.mainIdx||0].n}`);
                    d.push(` ▫️ 副菜：${s.sideIdx==='extra-veg'?'時蔬加量':data.side[s.sideIdx||0].i + '. ' + data.side[s.sideIdx||0].n}`);
                } else { d.push(` ▫️ 自由單點模式`); }
                Object.keys(s).forEach(k => { if (s[k]>0 && k.includes('addon')) {
                    const p = k.split('-');
                    if (k.startsWith('addonM-')) d.push(` ▫️ [加] ${data.main[p[1]].i}. ${data.main[p[1]].n}(M) x${s[k]}`);
                    if (k.startsWith('addonS-')) d.push(` ▫️ [加] ${data.side[p[1]].i}. ${data.side[p[1]].n}(S) x${s[k]}`);
                    if (k === 'addonSoup') d.push(` ▫️ [加購] ${data.soup.n} x${s[k]}`);
                }});
                d.push("");
            }
            d.push(`---------------------------`,`【總計金額：NT$ ${document.getElementById('cart-total').innerText}】`);
            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-container').classList.remove('hidden');
            document.getElementById('summary-content').innerText = d.join('\n');
            window.scrollTo(0, 0);
        });

        switchDay('Tue');
    </script>
</body>
