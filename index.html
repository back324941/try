<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搭伙晚餐 Hearth Table</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1410; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .gold-gradient { background: linear-gradient(135deg, #d4a574 0%, #a67c52 100%); }
        .day-tab.active { border-color: #a67c52; background-color: rgba(166, 124, 82, 0.1); color: #a67c52; }
        #cart-drawer { transition: transform 0.3s ease-in-out; transform: translateX(100%); }
        #cart-drawer.open { transform: translateX(0); }
        #cart-overlay { transition: opacity 0.3s ease; pointer-events: none; opacity: 0; }
        #cart-overlay.open { pointer-events: auto; opacity: 1; }
        /* 讓文字更清晰的微調 */
        .text-main-dish { font-size: 1.1rem; }
        .text-addon-name { font-size: 1rem; }
    </style>
</head>
<body class="min-h-screen py-6 px-4 pb-20 text-gray-900">

    <div class="fixed top-4 right-4 z-40 flex flex-col gap-3 items-end">
        <button type="button" onclick="toggleCart(true)" class="gold-gradient p-4 px-6 rounded-2xl shadow-2xl border border-white/20 backdrop-blur-md flex flex-col items-end active:scale-95 transition-transform">
            <div class="text-xs text-white/80 font-bold tracking-widest uppercase italic">Order Total</div>
            <div class="text-2xl font-black text-white italic tracking-tight">
                <span class="text-sm mr-1">NT$</span><span id="cart-total">0</span>
            </div>
            <div id="cart-count" class="text-[11px] text-white/90 font-bold mt-1 bg-black/20 px-2 py-0.5 rounded-full">查看明細</div>
        </button>
        <button type="button" onclick="resetAll()" class="bg-red-500/10 text-red-500 text-xs font-black px-4 py-2 rounded-full border border-red-500/20 backdrop-blur-sm">
            ↺ 重設全部
        </button>
    </div>

    <div id="cart-overlay" onclick="toggleCart(false)" class="fixed inset-0 bg-black/70 z-50"></div>
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-4/5 max-w-sm bg-white z-50 shadow-2xl p-6 flex flex-col">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-black text-gray-800 italic tracking-tighter border-b-4 border-[#a67c52]">MY ORDER</h2>
            <button onclick="toggleCart(false)" class="text-gray-400 text-3xl font-light p-2">✕</button>
        </div>
        <div id="cart-items-list" class="flex-1 overflow-y-auto space-y-4 text-base font-bold text-gray-700">
            </div>
        <div class="border-t pt-4 mt-4">
            <div class="flex justify-between items-end mb-4 px-1">
                <span class="text-gray-400 text-xs font-bold uppercase tracking-widest">Total Amount</span>
                <span class="text-3xl font-black text-[#a67c52]">NT$ <span id="drawer-total">0</span></span>
            </div>
            <button onclick="toggleCart(false)" class="w-full py-5 bg-gray-100 rounded-2xl font-black text-gray-600 text-lg tracking-widest uppercase">Continue</button>
        </div>
    </div>

    <div class="max-w-xl mx-auto">
        <div id="form-container" class="bg-white rounded-[2rem] shadow-2xl overflow-hidden">
            <div class="gold-gradient p-8 text-white text-center relative">
                <h1 class="text-3xl font-black tracking-[0.2em]">搭伙晚餐</h1>
                <p class="text-xs opacity-80 mt-1 tracking-[0.4em] font-light italic">HEARTH TABLE</p>
                <div class="mt-4 inline-block bg-black/10 px-5 py-2 rounded-full border border-white/20">
                    <p class="text-xs font-black tracking-widest text-yellow-100">✨ 全面使用「冷壓初榨橄欖油」✨</p>
                </div>
                <p class="text-[11px] mt-2 opacity-70">※ 本店餐點純手工製作，不附白飯</p>
            </div>

            <form id="orderForm" class="p-6 space-y-8">
                <div class="bg-gray-50 rounded-2xl p-6 space-y-5 border border-gray-100">
                    <input type="text" id="userName" required class="w-full px-5 py-4 rounded-xl border border-gray-200 outline-none focus:border-[#a67c52] text-lg font-bold" placeholder="聯絡人 (Line 名稱)">
                    
                    <div class="grid grid-cols-1 gap-4">
                        <div class="flex gap-2">
                            <select id="deliveryType" class="flex-1 px-4 py-4 rounded-xl border border-gray-200 outline-none bg-white font-black text-base appearance-none" onchange="toggleAddress(this.value)">
                                <option value="自取">自取 (免運)</option>
                                <option value="外送">外送 (+$50/日)</option>
                            </select>
                            <select id="pickupTime" class="flex-1 px-4 py-4 rounded-xl border border-gray-200 outline-none bg-white font-black text-base appearance-none">
                                <option value="17:00-18:00">17:00-18:00 取</option>
                                <option value="17:30-18:30">17:30-18:30 取</option>
                                <option value="18:30-19:00">18:30-19:00 取</option>
                            </select>
                        </div>
                    </div>
                    
                    <div id="addressBox" class="hidden space-y-2">
                        <input type="text" id="userAddress" class="w-full px-5 py-4 rounded-xl border border-gray-200 outline-none focus:border-[#a67c52] text-base font-bold" placeholder="請輸入外送地址">
                        <p class="text-xs text-orange-600 font-black px-1">⚠️ 僅限 3 公里內外送</p>
                    </div>
                    
                    <select id="paymentMethod" class="w-full px-5 py-4 rounded-xl border border-gray-200 outline-none bg-white font-black text-base appearance-none">
                        <option value="轉帳">轉帳 (優先)</option>
                        <option value="現金">現場支付</option>
                        <option value="管理員代付">社區管理員代付</option>
                    </select>
                </div>

                <div class="space-y-4">
                    <div class="flex justify-between items-end px-1">
                        <h2 class="text-sm font-black text-[#a67c52] tracking-widest italic uppercase">1. Select Date</h2>
                        <button type="button" onclick="resetCurrentDay()" class="text-xs text-gray-400 font-bold hover:text-red-500 border-b border-gray-200 pb-0.5">
                            ↺ 清空本日選擇
                        </button>
                    </div>
                    <div class="flex border-2 rounded-2xl overflow-hidden bg-gray-50 border-gray-100">
                        <button type="button" onclick="switchDay('Tue')" id="tab-Tue" class="day-tab active flex-1 py-4 text-center font-black text-lg">週二</button>
                        <button type="button" onclick="switchDay('Wed')" id="tab-Wed" class="day-tab flex-1 py-4 text-center font-black text-lg">週三</button>
                        <button type="button" onclick="switchDay('Thu')" id="tab-Thu" class="day-tab flex-1 py-4 text-center font-black text-lg">週四</button>
                        <button type="button" onclick="switchDay('Fri')" id="tab-Fri" class="day-tab flex-1 py-4 text-center font-black text-lg">週五</button>
                    </div>
                </div>

                <div id="menu-content" class="space-y-10 min-h-[300px]"></div>

                <div class="pt-10 border-t-2">
                    <button type="submit" id="submitBtn" class="gold-gradient w-full py-6 rounded-[1.5rem] text-white font-black text-2xl shadow-xl tracking-[0.3em] active:scale-95 transition-transform">確認預訂 / 產出截圖</button>
                </div>
            </form>
        </div>

        <div id="success-container" class="hidden bg-white rounded-[2rem] shadow-2xl p-8 text-center border">
            <div class="w-20 h-20 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-6 text-4xl shadow-lg">✓</div>
            <h2 class="text-3xl font-black text-gray-800 italic">ORDER SUCCESS</h2>
            <p class="text-red-500 font-black mt-3 text-lg">請「截圖」下方摘要<br>回傳至 Line 視窗</p>
            <div id="summary-content" class="mt-8 p-6 bg-gray-50 rounded-2xl text-left text-[15px] font-bold whitespace-pre-line leading-loose border border-gray-200 font-mono text-gray-800 shadow-inner"></div>
            <button onclick="location.reload()" class="mt-10 text-gray-400 text-sm font-black underline tracking-widest uppercase">Back to Menu</button>
        </div>
    </div>

    <script>
        const menus = {
            Tue: { main: [{n:"果香翅小腿",m:180,s:100},{n:"薑煸小卷",m:250,s:150},{n:"蔥爆豬肉片",m:180,s:100},{n:"乾煎鱸魚",m:210,s:120},{n:"乾煎鮭魚",m:290,s:170}], side: [{n:"糯米椒炒豆乾",m:100,s:60},{n:"馬鈴薯炒肉絲",m:110,s:70},{n:"番茄炒蛋",m:100,s:60}], soup: {n:"味噌牡蠣湯", p:100} },
            Wed: { main: [{n:"香菇肉燥",m:180,s:100},{n:"檸檬魚",m:230,s:130},{n:"蔥爆牛肉",m:240,s:140},{n:"大黃瓜燴蝦仁",m:180,s:100},{n:"乾煎鮭魚",m:290,s:170}], side: [{n:"蔬菜烘蛋",m:120,s:60},{n:"馬鈴薯炒肉絲",m:110,s:70},{n:"蔥爆豆乾",m:100,s:60}], soup: {n:"海帶芽貢丸湯", p:100} },
            Thu: { main: [{n:"南瓜滷肉",m:220,s:130},{n:"茄汁鯖魚",m:200,s:120},{n:"蔥爆牛肉",m:240,s:140},{n:"大黃瓜燴蝦仁",m:180,s:100},{n:"乾煎鮭魚",m:290,s:170}], side: [{n:"蟹黃豆腐煲",m:120,s:70},{n:"蔥爆豆乾",m:100,s:60},{n:"番茄炒蛋",m:100,s:60}], soup: {n:"香菇雞湯", p:120} },
            Fri: { main: [{n:"白醬嫩雞",m:200,s:120},{n:"絲瓜鮮蚵",m:190,s:110},{n:"蔥爆豬肉片",m:180,s:100},{n:"紅燒鱸魚",m:210,s:120},{n:"乾煎鮭魚",m:290,s:170}], side: [{n:"金針菇炒豆包",m:100,s:60},{n:"蔥爆豆乾",m:100,s:60},{n:"番茄炒蛋",m:100,s:60}], soup: {n:"香根牛肉湯", p:120} }
        };

        const alphabet = "ABCDE".split("");
        const sideAlphabet = "FGH".split("");
        let selections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} };
        let currentDay = 'Tue';

        function toggleCart(open) {
            document.getElementById('cart-drawer').classList.toggle('open', open);
            document.getElementById('cart-overlay').classList.toggle('open', open);
            if(open) updateDrawerList();
        }
        function toggleAddress(val) { document.getElementById('addressBox').classList.toggle('hidden', val==='自取'); updateTotal(); }
        function switchDay(day) { currentDay = day; document.querySelectorAll('.day-tab').forEach(t=>t.classList.remove('active')); document.getElementById(`tab-${day}`).classList.add('active'); renderMenu(); }
        
        function resetCurrentDay() {
            const name = {Tue:'週二', Wed:'週三', Thu:'週四', Fri:'週五'}[currentDay];
            if(confirm(`確定要清空 ${name} 的選擇嗎？`)) { selections[currentDay] = {}; renderMenu(); updateTotal(); }
        }
        function resetAll() { if(confirm('確定要清空所有天數嗎？')) { selections = { Tue: {}, Wed: {}, Thu: {}, Fri: {} }; renderMenu(); updateTotal(); } }

        function renderMenu() {
            const sel = selections[currentDay];
            const data = menus[currentDay];
            let html = `
            <div class="space-y-5 animate-in fade-in duration-300">
                <div class="grid grid-cols-2 gap-3">
                    <label class="cursor-pointer"><input type="radio" name="orderType" value="M" ${sel.type==='M'?'checked':''} onchange="updateSel('type','M')" class="peer sr-only"><div class="py-5 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52] text-lg shadow-sm">M 套餐 ($500)</div></label>
                    <label class="cursor-pointer"><input type="radio" name="orderType" value="S" ${sel.type==='S'?'checked':''} onchange="updateSel('type','S')" class="peer sr-only"><div class="py-5 text-center border-2 rounded-2xl font-black text-gray-400 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 peer-checked:text-[#a67c52] text-lg shadow-sm">S 套餐 ($300)</div></label>
                    <label class="cursor-pointer col-span-2"><input type="radio" name="orderType" value="NONE" ${sel.type==='NONE'?'checked':''} onchange="updateSel('type','NONE')" class="peer sr-only"><div class="py-3 text-center border-2 rounded-2xl font-black text-gray-300 peer-checked:border-red-400 peer-checked:text-red-500 text-xs tracking-widest uppercase italic">＋ 純加點模式 (基本費 $50)</div></label>
                </div>
            </div>`;

            if (sel.type) {
                if (sel.type !== 'NONE') {
                    const limit = sel.type === 'M' ? 180 : 100;
                    html += `<div class="space-y-3"><h3 class="text-xs font-black text-gray-400 tracking-widest italic uppercase">2. Select Main Dish</h3>`;
                    data.main.forEach((m, i) => {
                        const price = sel.type === 'M' ? m.m : m.s;
                        const extra = Math.max(0, price - limit);
                        html += `<label class="block cursor-pointer"><input type="radio" name="mainC" ${sel.mainIdx===i?'checked':''} onchange="updateSel('mainIdx',${i})" class="peer sr-only"><div class="p-5 border-2 rounded-2xl font-black text-gray-700 peer-checked:border-[#a67c52] peer-checked:bg-[#a67c52]/5 flex justify-between items-center text-main-dish shadow-sm"><span>[${alphabet[i]}] ${m.n}</span><span class="text-xs ${extra>0?'text-orange-500':'text-gray-300'}">${extra>0?'+$'+extra:'$0'}</span></div></label>`;
                    });
                    html += `</div><div class="space-y-3"><h3 class="text-xs font-black text-gray-400 tracking-widest italic uppercase">3. Select Side Dish</h3>`;
                    data.side.forEach((s, i) => {
                        html += `<label class="block cursor-pointer"><input type="radio" name="sideC" ${sel.sideIdx===i?'checked':''} onchange="updateSel('sideIdx',${i})" class="peer sr-only"><div class="p-5 border-2 rounded-2xl font-black text-gray-700 peer-checked:border-[#a67c52] text-lg shadow-sm">[${sideAlphabet[i]}] ${s.n}</div></label>`;
                    });
                    html += `<label class="block cursor-pointer"><input type="radio" name="sideC" ${sel.sideIdx==='extra-veg'?'checked':''} onchange="updateSel('sideIdx','extra-veg')" class="peer sr-only"><div class="p-5 border-2 rounded-2xl font-black text-green-600 peer-checked:border-green-500 bg-green-50/30 text-lg shadow-sm italic">✨ 不要副菜，時蔬加量</div></label></div>`;
                }

                html += `<div class="pt-8 border-t border-dashed space-y-4"><h3 class="text-sm font-black text-[#a67c52] tracking-widest italic border-l-8 border-[#a67c52] pl-3 uppercase">Add-ons 加購區</h3>`;
                data.main.forEach((m, i) => html += renderAddon(`addonM-${i}`, `[${alphabet[i]}] ${m.n}`, m.m, m.s));
                data.side.forEach((s, i) => html += renderAddon(`addonS-${i}`, `[${sideAlphabet[i]}] ${s.n}`, s.m, s.s));
                
                const sQty = sel['addonSoup'] || 0;
                html += `<div class="p-5 bg-gray-50 rounded-[1.5rem] flex justify-between items-center border border-gray-100 shadow-sm">
                    <div><div class="font-black text-gray-800 text-lg">[S] ${data.soup.n}</div><div class="text-xs text-gray-400 font-bold">$${data.soup.p}/份</div></div>
                    <div class="flex items-center gap-4"><button type="button" onclick="changeQty('addonSoup',-1)" class="w-12 h-12 bg-white border-2 rounded-xl text-gray-300 font-black text-xl">－</button><span class="w-6 text-center font-black text-xl">${sQty}</span><button type="button" onclick="changeQty('addonSoup',1)" class="w-12 h-12 bg-white border-2 rounded-xl text-[#a67c52] font-black text-xl">＋</button></div>
                </div></div>`;
            }
            document.getElementById('menu-content').innerHTML = html;
        }

        function renderAddon(id, name, pM, pS) {
            const sel = selections[currentDay];
            return `<div class="p-5 bg-gray-50 rounded-[1.5rem] space-y-4 border border-gray-100 shadow-sm"><div class="font-black text-gray-800 text-addon-name">${name}</div><div class="grid grid-cols-2 gap-4">
                <div class="bg-white p-3 px-4 rounded-xl flex justify-between items-center border-2 border-gray-50 shadow-inner"><span class="text-[11px] font-black text-gray-400 italic">M $${pM}</span><div class="flex items-center gap-3"><button type="button" onclick="changeQty('${id}-M',-1)" class="text-gray-300 font-black text-xl p-1">－</button><span class="text-lg font-black w-4 text-center">${sel[id+'-M']||0}</span><button type="button" onclick="changeQty('${id}-M',1)" class="text-[#a67c52] font-black text-xl p-1">＋</button></div></div>
                <div class="bg-white p-3 px-4 rounded-xl flex justify-between items-center border-2 border-gray-50 shadow-inner"><span class="text-[11px] font-black text-gray-400 italic">S $${pS}</span><div class="flex items-center gap-3"><button type="button" onclick="changeQty('${id}-S',-1)" class="text-gray-300 font-black text-xl p-1">－</button><span class="text-lg font-black w-4 text-center">${sel[id+'-S']||0}</span><button type="button" onclick="changeQty('${id}-S',1)" class="text-[#a67c52] font-black text-xl p-1">＋</button></div></div>
            </div></div>`;
        }

        function updateSel(k, v) { selections[currentDay][k] = v; renderMenu(); updateTotal(); }
        function changeQty(id, amt) { selections[currentDay][id] = Math.max(0, (selections[currentDay][id] || 0) + amt); renderMenu(); updateTotal(); }

        function updateTotal() {
            let total = 0; let activeDays = 0;
            const delivery = document.getElementById('deliveryType').value;
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                activeDays++;
                if (s.type === 'M') { total += 500; total += Math.max(0, menus[day].main[s.mainIdx||0].m - 180); }
                else if (s.type === 'S') { total += 300; total += Math.max(0, menus[day].main[s.mainIdx||0].s - 100); }
                else total += 50;
                Object.keys(s).forEach(k => {
                    if (s[k] <= 0) return;
                    const p = k.split('-');
                    if (k.startsWith('addonM-')) total += s[k] * (p[2]==='M' ? menus[day].main[p[1]].m : menus[day].main[p[1]].s);
                    if (k.startsWith('addonS-')) total += s[k] * (p[2]==='M' ? menus[day].side[p[1]].m : menus[day].side[p[1]].s);
                    if (k === 'addonSoup') total += s[k] * menus[day].soup.p;
                });
            }
            const grandTotal = total + (delivery === '外送' ? activeDays * 50 : 0);
            document.getElementById('cart-total').innerText = grandTotal.toLocaleString();
            document.getElementById('drawer-total').innerText = grandTotal.toLocaleString();
            document.getElementById('cart-count').innerText = activeDays > 0 ? `已點餐 ${activeDays} 天` : "查看明細";
        }

        function updateDrawerList() {
            let list = [];
            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                const dName = {Tue:'週二', Wed:'週三', Thu:'週四', Fri:'週五'}[day];
                let text = `<div class="p-4 bg-gray-50 rounded-2xl border-l-8 border-[#a67c52] shadow-sm"><div class="text-[#a67c52] font-black text-lg mb-1">${dName}</div>`;
                if(s.type !== 'NONE') text += `<div class="text-sm">▫️ ${s.type}套餐: ${menus[day].main[s.mainIdx||0].n}</div>`;
                else text += `<div class="text-sm">▫️ 純加點模式</div>`;
                list.push(text + `</div>`);
            }
            document.getElementById('cart-items-list').innerHTML = list.length ? list.join('') : '<div class="text-center py-20 text-gray-300 font-black">購物車空空的</div>';
        }

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let d = [];
            const delivery = document.getElementById('deliveryType').value;
            const address = document.getElementById('userAddress').value;

            d.push(`【搭伙晚餐 Hearth Table 預訂】`);
            d.push(`▫️ 聯絡人：${document.getElementById('userName').value}`);
            d.push(`▫️ 方式：${delivery}${address ? ' ('+address+')' : ''}`);
            d.push(`▫️ 時段：${document.getElementById('pickupTime').value}`);
            d.push(`▫️ 付款：${document.getElementById('paymentMethod').value}`);
            d.push(`---------------------------`);
            d.push(`✨ 全面使用冷壓初榨橄欖油`);
            d.push(`🚫 本店不提供白飯`);
            d.push(`---------------------------`);

            for (let day in selections) {
                const s = selections[day]; if (!s.type) continue;
                const data = menus[day];
                d.push(`● ${{Tue:'週二', Wed:'週三', Thu:'週四', Fri:'週五'}[day]}`);
                if (s.type !== 'NONE') {
                    const mObj = data.main[s.mainIdx||0];
                    const limit = s.type === 'M' ? 180 : 100;
                    const extra = Math.max(0, (s.type==='M'?mObj.m:mObj.s) - limit);
                    const sideName = s.sideIdx==='extra-veg' ? '不要副菜(時蔬加量)' : `[${sideAlphabet[s.sideIdx||0]}] ${data.side[s.sideIdx||0].n}`;
                    d.push(` ▫️ ${s.type}套餐：${mObj.n}${extra>0?' (+'+extra+')':''}`);
                    d.push(` ▫️ 副菜：${sideName}`);
                }
                Object.keys(s).forEach(k => {
                    const qty = s[k]; if (qty <= 0) return;
                    if (k.startsWith('addonM-')) { const p = k.split('-'); d.push(` ▫️ [加點] [${alphabet[p[1]]}] ${data.main[p[1]].n} (${p[2]}) x${qty}`); }
                    if (k.startsWith('addonS-')) { const p = k.split('-'); d.push(` ▫️ [加點] [${sideAlphabet[p[1]]}] ${data.side[p[1]].n} (${p[2]}) x${qty}`); }
                    if (k === 'addonSoup') d.push(` ▫️ [加點] [S] ${data.soup.n} x${qty}`);
                });
                d.push("");
            }
            d.push(`---------------------------`);
            d.push(`【總計：NT$ ${document.getElementById('cart-total').innerText}】`);

            document.getElementById('form-container').classList.add('hidden');
            document.getElementById('success-container').classList.remove('hidden');
            document.getElementById('summary-content').innerText = d.join('\n');
            window.scrollTo(0, 0);
        });

        switchDay('Tue');
    </script>
</body>
